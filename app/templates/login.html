<!DOCTYPE html>
<html lang="en">
<head>
    <title>SYFS Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- الأيقونة -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/p3.png') }}" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- ربط ملف الـ CSS من static -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- ===== Flash Message (Modern Red Style) ===== -->
    <style>
        .login-flash {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 260px;
            max-width: 360px;
            background: #ff4d4d;
            color: white;
            padding: 12px 16px;
            font-size: 0.95rem;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s ease-out;
            z-index: 9999;
        }

        .login-flash-hide {
            animation: fadeOut 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to   { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translate(-50%, 0); }
            to   { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>

<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <!-- رسائل الفلاش الخاصة بتسجيل الدخول -->
            {% with messages = get_flashed_messages(with_categories=True) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="login-flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/syflogo.png') }}" alt="SYFS Logo" />
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Please login to your account</p>
            </div>

            <form method="post" id="loginForm">

                <div class="form-group">
                    <label class="form-label" for="email">
                        Username
                    </label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-user-circle"></i>
                        <!-- ملاحظة: name="email" لكن يحتوي الـ username -->
                        <input class="form-input" id="email" name="email"
                               placeholder="     Enter your username"
                               autocomplete="username"
                               type="text" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        Password
                    </label>
                    <div class="input-wrapper">
                        <i class="input-icon fas fa-lock"></i>
                        <input class="form-input" id="password" name="password"
                               placeholder="     Enter your password"
                               autocomplete="current-password"
                               type="password" required />
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input class="checkbox-input" id="rememberMe" type="checkbox" name="remember" value="true" />
                        <label class="checkbox-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>

                    <!-- ربط خيار نسيان كلمة المرور بالراوت الجديد -->
                    <a class="forgot-link" href="{{ url_for('auth.forgot_password') }}">
                        <i class="fas fa-question-circle"></i>
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="login-button" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Log In
                </button>
            </form>
        </div>

        <div class="footer-text">
            © 2026 SYFS. All rights reserved. | <a href="#">Support</a>
        </div>
    </div>

    <script>
        // أنيميشن زر تسجيل الدخول أثناء الإرسال
        document.getElementById('loginForm').addEventListener('submit', function () {
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');
            btn.disabled = true;
        });

        // تأثير بسيط عند الفوكس على الحقول
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // إخفاء رسالة الخطأ بعد 3 ثواني
        setTimeout(function () {
            const flash = document.querySelector('.login-flash');
            if (flash) {
                flash.classList.add("login-flash-hide");
                setTimeout(() => flash.remove(), 600);
            }
        }, 3000);
    </script>
</body>
</html>
